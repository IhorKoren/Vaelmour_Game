services:
  - type: web
    name: vaelmour-racing-multiplayer
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
