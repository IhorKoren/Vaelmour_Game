# Netlify Configuration for Vaelmour WebApp

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/telegram/full-health-notification"
  to = "/.netlify/functions/sendFullHealthNotification"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

